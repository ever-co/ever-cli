name: Build Native Binaries

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ever
            artifact_name: ever-cli-linux-x64-gnu
            package_dir: npm/cli-linux-x64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: ever
            artifact_name: ever-cli-linux-x64-musl
            package_dir: npm/cli-linux-x64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: ever
            artifact_name: ever-cli-linux-arm64-gnu
            package_dir: npm/cli-linux-arm64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: ever
            artifact_name: ever-cli-darwin-arm64
            package_dir: npm/cli-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: ever
            artifact_name: ever-cli-darwin-x64
            package_dir: npm/cli-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ever.exe
            artifact_name: ever-cli-win32-x64-msvc
            package_dir: npm/cli-win32-x64-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: ever.exe
            artifact_name: ever-cli-win32-arm64-msvc
            package_dir: npm/cli-win32-arm64-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync platform package versions
        run: node ./scripts/sync-package-versions.js

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux musl target tools
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure Linux musl linker
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Install aarch64 GNU cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure aarch64 GNU linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare package artifact
        shell: bash
        run: |
          node ./scripts/prepare-platform-package.js \
            "${{ matrix.package_dir }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
            "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
