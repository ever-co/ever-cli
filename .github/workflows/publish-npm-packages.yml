name: Publish NPM Packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-publish:
    name: Verify npm publish prerequisites
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify npm auth and scope access
        run: node ./scripts/check-npm-publish-prereqs.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-platform:
    name: Publish ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    needs: preflight-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}"
            target: x86_64-unknown-linux-gnu
            binary_name: ever
            artifact_name: ever-cli-linux-x64-gnu
            package_dir: npm/cli-linux-x64-gnu
          - os: "${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}"
            target: x86_64-unknown-linux-musl
            binary_name: ever
            artifact_name: ever-cli-linux-x64-musl
            package_dir: npm/cli-linux-x64-musl
          - os: "${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}"
            target: aarch64-unknown-linux-gnu
            binary_name: ever
            artifact_name: ever-cli-linux-arm64-gnu
            package_dir: npm/cli-linux-arm64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: ever
            artifact_name: ever-cli-darwin-arm64
            package_dir: npm/cli-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: ever
            artifact_name: ever-cli-darwin-x64
            package_dir: npm/cli-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ever.exe
            artifact_name: ever-cli-win32-x64-msvc
            package_dir: npm/cli-win32-x64-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: ever.exe
            artifact_name: ever-cli-win32-arm64-msvc
            package_dir: npm/cli-win32-arm64-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync platform package versions
        run: node ./scripts/sync-package-versions.js

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux musl target tools
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Configure Linux musl linker
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Install aarch64 GNU cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure aarch64 GNU linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare package
        shell: bash
        run: |
          node ./scripts/prepare-platform-package.js \
            "${{ matrix.package_dir }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
            "dist/${{ matrix.artifact_name }}"

      - name: Publish platform package
        run: npm publish "./dist/${{ matrix.artifact_name }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    name: Publish ever-cli
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    needs: publish-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync platform package versions
        run: node ./scripts/sync-package-versions.js

      - name: Publish main package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
